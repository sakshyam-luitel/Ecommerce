{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Checkout</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{%static 'styles/shared/general.css'%}">
    <link rel="stylesheet" href="{% static 'styles/pages/checkout/checkout-header.css'%}">
    <link rel="stylesheet" href="{% static 'styles/pages/checkout/checkout.css'%}">
  </head>
  <body>
    <div class="checkout-header">
      <div class="header-content">
        <div class="checkout-header-left-section">
          <a href="{%url 'amazon'%}">
            <img class="amazon-logo" src="{% static 'images/amazon-logo.png'%}">
            <img class="amazon-mobile-logo" src="{% static 'images/amazon-mobile-logo.png'%}">
          </a>
        </div>

        <div class="checkout-header-middle-section">
          Checkout (<a class="return-to-home-link js-return-to-home"
            href="{%url 'amazon'%}"></a>)
        </div>

        <div class="checkout-header-right-section" style="display: flex; align-items: center; justify-content: flex-end; gap: 15px;">
        <div class="js-user-container" style="display: flex; align-items: center; gap: 10px;">
          <span class="js-username-greeting" style="font-weight: 700; font-size: 15px; color: #0F1111;">Guest</span>
          <button class="js-logout-button" style="display: flex; align-items: center; gap: 6px; background: #f7ebae; border: 1px solid #FCD200; border-radius: 4px; font-family: Roboto; font-weight: 700; font-size: 13px; color: #0F1111; cursor: pointer; padding: 6px 12px; box-shadow: 0 2px 5px rgba(213,217,217,0.5); white-space: nowrap;">
            <i class="fa-solid fa-right-from-bracket"></i> Log out
          </button>
        </div>
          <img src="{% static 'images/icons/checkout-lock-icon.png' %}">
        </div>
      </div>
    </div>

    <div class="main">
      <div class="page-title">Review your order</div>

      <div class="checkout-grid">
        <div class="order-summary js-order-summary">
        </div>

        <div class="payment-summary js-payment-summary">
          
        </div>
      </div>
    </div>

    <script src = "{%static 'scripts/checkout.js'%}" type ="module">
      const ordersUrl = "{% url 'orders'%}";
    </script>
  </body>
</html>
