{% load static %}
<div class="amazon-header">
  <div class="amazon-header-left-section">
    <a href="{%url 'amazon'%}" class="header-link">
      <img class="amazon-logo" src="{% static 'images/amazon-logo-white.png'%}">
      <img class="amazon-mobile-logo" src="{% static 'images/amazon-mobile-logo-white.png' %}">
    </a>
  </div>

  <div class="amazon-header-middle-section">
  </div>

  <div class="amazon-header-right-section">
    <div class="header-link js-user-container" style="display: flex; align-items: center; gap: 10px; margin-right: 10px; text-decoration: none;">
      <span class="js-username-greeting" style="font-weight: 700; font-size: 15px; color: white; white-space: nowrap;"></span>
      <button class="js-logout-button" style="display: flex; align-items: center; gap: 6px; background: orange; border: none; border-radius: 4px; font-family: Roboto; font-weight: 700; font-size: 13px; color: black; cursor: pointer; padding: 6px 12px; transition: background-color 0.2s; white-space: nowrap;">       
        <i class="fa-solid fa-right-from-bracket"></i> Log out
      </button>
    </div>
    <a class="orders-link header-link" href="{% url 'orders'%}" style="display: flex; align-items: center; gap: 5px; text-decoration: none;">
      <span class="returns-text" style="font-size: 15px; font-weight: 400; color: white; white-space: nowrap;">Returns</span>
      <span class="orders-text" style="font-size: 15px; font-weight: 700; color: white; white-space: nowrap;">& Orders</span>
    </a>

    <a class="cart-link header-link" href="{% url 'checkout' %}">
      <img class="cart-icon" src="{% static 'images/icons/cart-icon.png' %}">
      <div class="cart-quantity js-cart-quantity"></div>
      <div class="cart-text">Cart</div>
    </a>
    
  </div>
</div>
