{% load static %}
<div class="amazon-header">
  <div class="amazon-header-left-section">
    <a href="{%url 'amazon'%}" class="header-link" style="text-decoration: none;">
      <h2 style="color: white; margin: 0; font-family: Roboto; font-style: italic;">Ecommerce</h2>
    </a>
  </div>

  <div class="amazon-header-middle-section">
  </div>

  <div class="amazon-header-right-section">
    <div class="header-link js-user-container user-container">
      <span class="js-username-greeting username-greeting"></span>
      <button class="js-logout-button logout-button">       
        <i class="fa-solid fa-right-from-bracket"></i> <span class="logout-text">Log out</span>
      </button>
    </div>
    <a class="orders-link header-link" href="{% url 'orders'%}">
      <span class="returns-text">Returns</span>
      <span class="orders-text">& Orders</span>
    </a>

    <a class="cart-link header-link" href="{% url 'checkout' %}">
      <img class="cart-icon" src="{% static 'images/icons/cart-icon.png' %}">
      <div class="cart-quantity js-cart-quantity"></div>
      <div class="cart-text">Cart</div>
    </a>
    
  </div>
</div>
